spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:stocknews}
    username: ${POSTGRES_USER:stocknews}
    password: ${POSTGRES_PASSWORD:stocknews_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: https://finnhub.io/api/v1
  newsdata:
    api-key: ${NEWSDATA_API_KEY:}
    base-url: https://newsdata.io/api/1
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-min-32-chars-long-for-hs256}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  rate-limit:
    daily-per-user: ${RATE_LIMIT_DAILY_PER_USER:100}
    daily-anonymous: ${RATE_LIMIT_DAILY_ANONYMOUS:30}
