spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:stocknews}
    username: ${PGUSER:stocknews}
    password: ${PGPASSWORD:stocknews}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDISHOST:redis}
      port: ${REDISPORT:6379}
      password: ${REDISPASSWORD:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  finnhub:
    api-key: ${FINNHUB_API_KEY}
    base-url: https://finnhub.io/api/v1
  newsdata:
    api-key: ${NEWSDATA_API_KEY}
    base-url: https://newsdata.io/api/1
  rate-limit:
    daily-per-user: ${RATE_LIMIT_DAILY_PER_USER:100}
    daily-anonymous: ${RATE_LIMIT_DAILY_ANONYMOUS:30}

logging:
  level:
    com.stocknews: INFO
    org.springframework: WARN
